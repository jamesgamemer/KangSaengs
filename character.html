<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character - 7DS Origin</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/character-detail.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Admin Bar -->
  <div class="admin-bar" id="adminBar" style="display:none;">
    <div class="admin-bar-left">
      <span class="admin-badge">ADMIN</span>
      <a href="admin.html" class="admin-bar-link">Dashboard</a>
      <button class="admin-bar-btn edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()">Enable Edit Mode</button>
    </div>
    <div class="admin-bar-right">
      <button class="admin-bar-btn save-btn" id="saveBtn" style="display:none;" onclick="saveAllChanges()">Save Changes</button>
      <button class="admin-bar-btn cancel-btn" id="cancelBtn" style="display:none;" onclick="cancelEdit()">Cancel</button>
      <button class="admin-bar-btn" onclick="Auth.logout(); location.reload();">Logout</button>
    </div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">7DS<span>Origin</span></a>
    <div class="navbar-hamburger" id="navHam"><span></span><span></span><span></span></div>
    <ul class="navbar-links" id="navLinks">
      <li><a href="index.html">&#127968; Home</a></li>
      <li><a href="characters.html" class="active">&#9876; Characters</a></li>
      <li><a href="tierlist.html">&#127942; Tier List</a></li>
      <li><a href="events.html">&#127881; Events</a></li>
    </ul>
  </nav>

  <div class="page-content">
    <div class="container">
      <a href="characters.html" class="page-back-v2"><span class="arrow">&#8592;</span> Back to Characters</a>
      <div id="characterContent">
        <div class="no-data-msg">Loading character data...</div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>7DS Origin Database &mdash; Fan-made site &mdash; Not affiliated with Netmarble</p>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    var charData = null;
    var charId = null;
    var currentWeapon = null;
    var editMode = false;

    // ---- Utility Functions ----
    function esc(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getBadgeClass(type) {
      var m = {
        'adventure':'badge-adventure','passive':'badge-passive',
        'normal':'badge-normal','normal attack':'badge-normal',
        'special':'badge-special','skill':'badge-skill',
        'tag':'badge-tag','ultimate':'badge-ultimate'
      };
      return m[(type||'').toLowerCase().trim()] || 'badge-normal';
    }

    function highlightNums(text) {
      if (!text) return '';
      var t = esc(text);
      t = t.replace(/(\d+(?:\.\d+)?%)/g, '<span class="hl-num">$1</span>');
      t = t.replace(/(\d+)\s*(sec\b)/g, '<span class="hl-dur">$1 $2</span>');
      return t;
    }

    function extractHits(desc) {
      var hits = [];
      var pattern = /(\d+(?:st|nd|rd|th)\s+hit:\s*\d+(?:\.\d+)?%)/gi;
      var match;
      var clean = desc || '';
      while ((match = pattern.exec(desc)) !== null) {
        hits.push(match[1]);
      }
      hits.forEach(function(h) { clean = clean.replace(h, ''); });
      clean = clean.replace(/\s{2,}/g, ' ').trim();
      return { clean: clean, hits: hits };
    }

    // ---- Render Functions ----
    function renderPage(c) {
      charData = c;
      document.title = c.name + ' - 7DS Origin';

      var hasSkills = false;
      if (c.skills && typeof c.skills === 'object') {
        for (var k in c.skills) {
          if (c.skills[k] && c.skills[k].length > 0) { hasSkills = true; break; }
        }
      }

      var weaponKeys = [];
      if (hasSkills) {
        var skillKeys = Object.keys(c.skills);
        (c.types || []).forEach(function(t) {
          var tNorm = t.toLowerCase().replace(/\s+/g, '');
          skillKeys.forEach(function(sk) {
            var skNorm = sk.toLowerCase().replace(/[\s_]+/g, '');
            if (skNorm === tNorm && weaponKeys.indexOf(sk) === -1) weaponKeys.push(sk);
          });
        });
        skillKeys.forEach(function(sk) {
          if (weaponKeys.indexOf(sk) === -1 && c.skills[sk] && c.skills[sk].length > 0) weaponKeys.push(sk);
        });
      }

      var rarityClass = (c.rarity === 'SSR') ? 'ssr' : 'sr';
      var typePills = (c.types || []).map(function(t) {
        return '<span class="type-pill">' + esc(t) + '</span>';
      }).join('');

      var html = '<div class="char-detail-header">';
      html += '<div class="char-detail-portrait">';
      html += '<h1>' + esc(c.name) + '</h1>';
      html += '<img src="' + esc(c.image || 'images/placeholder.png') + '" class="char-img" alt="' + esc(c.name) + '">';
      html += '<div><span class="char-rarity-badge ' + rarityClass + '">' + esc(c.rarity) + '</span></div>';
      html += '</div>';
      html += '<div class="char-detail-info">';
      html += '<div class="section-label">Description</div>';
      html += '<p class="desc-text" data-field="description">' + esc(c.description) + '</p>';
      html += '<div class="char-types"><span class="label">Weapon Types:</span>' + typePills + '</div>';
      html += '</div></div>';

      if (hasSkills && weaponKeys.length > 0) {
        html += '<div class="weapon-tabs-wrapper"><div class="weapon-tabs">';
        weaponKeys.forEach(function(wk, i) {
          var display = wk.replace(/_/g, ' ').replace(/\b\w/g, function(l) { return l.toUpperCase(); });
          (c.types || []).forEach(function(t) {
            if (t.toLowerCase().replace(/\s+/g, '') === wk.toLowerCase().replace(/[\s_]+/g, '')) display = t;
          });
          var active = (i === 0) ? ' class="active"' : '';
          html += '<button onclick="showWeapon(\'' + esc(wk) + '\',this)"' + active + '>' + esc(display) + '</button>';
        });
        html += '</div></div>';
        html += '<div id="weaponContent"></div>';
        currentWeapon = weaponKeys[0];
      } else {
        html += '<div class="no-data-msg">';
        html += '<p>&#128679; Skills, Potentials, and Costumes data will be added soon.</p>';
        html += '<p style="margin-top:8px;font-size:13px;color:var(--border);">Check back later for updates</p>';
        html += '</div>';
      }

      document.getElementById('characterContent').innerHTML = html;

      if (hasSkills && weaponKeys.length > 0) {
        showWeapon(weaponKeys[0], document.querySelector('.weapon-tabs button'));
      }
    }

    function renderSkillCard(sk, idx) {
      var stype = sk.type || 'Normal';
      var badge = getBadgeClass(stype);
      var isUlt = stype.toLowerCase() === 'ultimate';
      var desc = sk.description || '';
      var extracted = extractHits(desc);

      var html = '<div class="skill-card-v2' + (isUlt ? ' ultimate-card' : '') + '" data-skill-idx="' + idx + '">';
      html += '<div class="skill-header">';
      html += '<div class="skill-name" data-field="skill-name" data-idx="' + idx + '">' + esc(sk.name) + '</div>';
      html += '<span class="skill-type-badge ' + badge + '">' + esc(stype) + '</span>';
      html += '</div>';
      if (extracted.clean) {
        html += '<div class="skill-desc" data-field="skill-desc" data-idx="' + idx + '">' + highlightNums(extracted.clean) + '</div>';
      }
      if (extracted.hits.length > 0) {
        html += '<div class="dmg-breakdown">';
        extracted.hits.forEach(function(h) {
          var parts = h.split(':');
          if (parts.length >= 2) {
            html += '<div class="dmg-box"><span class="dmg-label">' + esc(parts[0].trim()) + '</span><span class="dmg-value">' + esc(parts[1].trim()) + '</span></div>';
          }
        });
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function renderPotentials(pots) {
      if (!pots || pots.length === 0) return '';
      var html = '<div class="potentials-section-v2">';
      html += '<div class="detail-section-title">Potentials</div>';
      html += '<div class="detail-section-sub">Unlock powerful upgrades as you progress</div>';
      html += '<div class="potentials-grid-v2">';
      pots.forEach(function(p, i) {
        var tier = p.tier || '';
        var num = (tier.toString().match(/\d+/) || ['?'])[0];
        var milestone = (num === '5' || num === '7' || num === '10') ? ' tier-milestone' : '';
        html += '<div class="potential-card-v2' + milestone + '" data-pot-idx="' + i + '">';
        html += '<div class="tier-label"><span class="tier-num">' + num + '</span> Tier ' + num + '</div>';
        html += '<div class="tier-desc" data-field="pot-desc" data-idx="' + i + '">' + highlightNums(p.description || '') + '</div>';
        html += '</div>';
      });
      html += '</div></div>';
      return html;
    }

    function renderCostumes(costumes) {
      if (!costumes || costumes.length === 0) return '';
      var html = '<div class="costumes-section-v2">';
      html += '<div class="detail-section-title">Costumes</div>';
      html += '<div class="detail-section-sub">Available skins and outfits</div>';
      html += '<div class="costumes-grid-v2">';
      costumes.forEach(function(c, i) {
        var name = (typeof c === 'string') ? c : (c.name || '');
        html += '<div class="costume-card-v2" data-costume-idx="' + i + '">';
        html += '<div class="costume-icon">&#128090;</div>';
        html += '<p data-field="costume-name" data-idx="' + i + '">' + esc(name) + '</p>';
        html += '</div>';
      });
      html += '</div></div>';
      return html;
    }

    function showWeapon(type, btn) {
      currentWeapon = type;
      document.querySelectorAll('.weapon-tabs button').forEach(function(b) { b.classList.remove('active'); });
      if (btn) btn.classList.add('active');

      var skills = (charData.skills && charData.skills[type]) || [];
      var pots = (charData.potentials && charData.potentials[type]) || [];
      var costumes = charData.costumes || [];

      var html = '<div class="detail-section-title">Skills</div>';
      html += '<div class="detail-section-sub">Combat abilities and techniques</div>';
      html += '<div class="skills-grid">';
      skills.forEach(function(sk, i) { html += renderSkillCard(sk, i); });
      html += '</div>';
      html += renderPotentials(pots);
      html += renderCostumes(costumes);

      document.getElementById('weaponContent').innerHTML = html;

      // Re-apply edit mode if active
      if (editMode) applyEditMode();
    }

    // ---- Inline Edit System ----
    function toggleEditMode() {
      editMode = !editMode;
      var btn = document.getElementById('editToggleBtn');
      var saveBtn = document.getElementById('saveBtn');
      var cancelBtn = document.getElementById('cancelBtn');

      if (editMode) {
        btn.textContent = 'Editing...';
        btn.classList.add('active');
        saveBtn.style.display = '';
        cancelBtn.style.display = '';
        applyEditMode();
      } else {
        btn.textContent = 'Enable Edit Mode';
        btn.classList.remove('active');
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
        removeEditMode();
      }
    }

    function applyEditMode() {
      // Make description editable
      var descEl = document.querySelector('[data-field="description"]');
      if (descEl) {
        descEl.setAttribute('contenteditable', 'true');
        descEl.classList.add('editable-field');
      }

      // Make skill names and descriptions editable
      document.querySelectorAll('[data-field="skill-name"]').forEach(function(el) {
        el.setAttribute('contenteditable', 'true');
        el.classList.add('editable-field');
      });
      document.querySelectorAll('[data-field="skill-desc"]').forEach(function(el) {
        el.setAttribute('contenteditable', 'true');
        el.classList.add('editable-field');
        // Show raw text for editing
        var idx = parseInt(el.getAttribute('data-idx'));
        var skills = (charData.skills && charData.skills[currentWeapon]) || [];
        if (skills[idx]) {
          el.textContent = skills[idx].description || '';
        }
      });

      // Make potential descriptions editable
      document.querySelectorAll('[data-field="pot-desc"]').forEach(function(el) {
        el.setAttribute('contenteditable', 'true');
        el.classList.add('editable-field');
        var idx = parseInt(el.getAttribute('data-idx'));
        var pots = (charData.potentials && charData.potentials[currentWeapon]) || [];
        if (pots[idx]) {
          el.textContent = pots[idx].description || '';
        }
      });

      // Make costume names editable
      document.querySelectorAll('[data-field="costume-name"]').forEach(function(el) {
        el.setAttribute('contenteditable', 'true');
        el.classList.add('editable-field');
      });
    }

    function removeEditMode() {
      document.querySelectorAll('.editable-field').forEach(function(el) {
        el.removeAttribute('contenteditable');
        el.classList.remove('editable-field');
      });
      // Re-render to restore highlighted formatting
      if (currentWeapon) {
        showWeapon(currentWeapon, document.querySelector('.weapon-tabs button.active'));
      }
    }

    function saveAllChanges() {
      if (!charData || !charId) return;

      // Save description
      var descEl = document.querySelector('[data-field="description"]');
      if (descEl) {
        charData.description = descEl.textContent.trim();
      }

      // Save skill names and descriptions
      var skills = (charData.skills && charData.skills[currentWeapon]) || [];
      document.querySelectorAll('[data-field="skill-name"]').forEach(function(el) {
        var idx = parseInt(el.getAttribute('data-idx'));
        if (skills[idx]) skills[idx].name = el.textContent.trim();
      });
      document.querySelectorAll('[data-field="skill-desc"]').forEach(function(el) {
        var idx = parseInt(el.getAttribute('data-idx'));
        if (skills[idx]) skills[idx].description = el.textContent.trim();
      });

      // Save potential descriptions
      var pots = (charData.potentials && charData.potentials[currentWeapon]) || [];
      document.querySelectorAll('[data-field="pot-desc"]').forEach(function(el) {
        var idx = parseInt(el.getAttribute('data-idx'));
        if (pots[idx]) pots[idx].description = el.textContent.trim();
      });

      // Save costume names
      var costumes = charData.costumes || [];
      document.querySelectorAll('[data-field="costume-name"]').forEach(function(el) {
        var idx = parseInt(el.getAttribute('data-idx'));
        if (idx < costumes.length) {
          if (typeof costumes[idx] === 'string') {
            costumes[idx] = el.textContent.trim();
          } else {
            costumes[idx].name = el.textContent.trim();
          }
        }
      });

      // Update in CharDB
      CharDB.update(charId, charData);

      // Show success notification
      showNotification('Changes saved successfully!', 'success');

      // Exit edit mode
      editMode = false;
      var btn = document.getElementById('editToggleBtn');
      btn.textContent = 'Enable Edit Mode';
      btn.classList.remove('active');
      document.getElementById('saveBtn').style.display = 'none';
      document.getElementById('cancelBtn').style.display = 'none';

      // Re-render
      renderPage(charData);
    }

    function cancelEdit() {
      editMode = false;
      var btn = document.getElementById('editToggleBtn');
      btn.textContent = 'Enable Edit Mode';
      btn.classList.remove('active');
      document.getElementById('saveBtn').style.display = 'none';
      document.getElementById('cancelBtn').style.display = 'none';

      // Reload original data
      charData = CharDB.getById(charId);
      renderPage(charData);
    }

    function showNotification(msg, type) {
      var notif = document.createElement('div');
      notif.className = 'notification ' + (type || 'info');
      notif.textContent = msg;
      document.body.appendChild(notif);
      setTimeout(function() { notif.classList.add('show'); }, 10);
      setTimeout(function() {
        notif.classList.remove('show');
        setTimeout(function() { notif.remove(); }, 300);
      }, 3000);
    }

    // ---- Initialize ----
    (function init() {
      var params = new URLSearchParams(window.location.search);
      charId = params.get('id');

      if (!charId) {
        document.getElementById('characterContent').innerHTML = '<div class="no-data-msg">No character specified. <a href="characters.html">Browse all characters</a></div>';
        return;
      }

      CharDB.loadAll(function(chars) {
        var c = CharDB.getById(charId);
        if (!c) {
          document.getElementById('characterContent').innerHTML = '<div class="no-data-msg">Character not found. <a href="characters.html">Browse all characters</a></div>';
          return;
        }
        renderPage(c);
        Auth.updateAdminUI();
      });
    })();
  </script>
</body>
</html>
