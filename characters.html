  <title>Characters - 7DS Origin</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-header {
      background: linear-gradient(180deg, #0d1f4a 0%, var(--dark2) 100%);
      padding: 80px 20px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(96,165,250,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,165,250,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .page-header-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px var(--glow-gold);
      position: relative;
      z-index: 1;
    }
    .page-header-sub {
      color: var(--muted);
      font-size: 15px;
      letter-spacing: 2px;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }

    .search-bar {
      width: 100%;
      padding: 13px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--dark3);
      color: white;
      margin-bottom: 20px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .search-bar:focus {
      outline: none;
      border-color: var(--gold);
    }
    .search-bar::placeholder { color: var(--muted); }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 30px;
    }

    .filters button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--dark3);
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.2s;
    }

    .filters button:hover,
    .filters button.active-filter {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(240,192,64,0.08);
    }

    #charactersGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--dark3);
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      border: 1px solid var(--border);
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--gold);
      box-shadow: 0 8px 24px rgba(240,192,64,0.18);
    }

    .card img { width: 100%; display: block; }

    .rarity { font-size: 10px; padding: 3px; font-weight: 700; }
    .name   { font-size: 12px; padding: 6px; font-weight: 600; }

    a { text-decoration: none; color: white; }
  </style>
</head>

    var grid = document.getElementById('charactersGrid');

    function render(list) {
      grid.innerHTML = '';
      list.forEach(function(c) {
        grid.innerHTML += '<a href="'+c.link+'">'
          + '<div class="card">'
          + '<img src="'+c.img+'" alt="'+c.name+'" loading="lazy">'
          + '<div class="rarity '+c.rarity+'">'+c.rarity+'</div>'
          + '<div class="name">'+c.name+'</div>'
          + '</div></a>';
      });
    }

    function getUniqueCharacters() {
      return Object.values(characters.reduce(function(acc, char) {
        if (!acc[char.name]) acc[char.name] = char;
        return acc;
      }, {}));
    }

    render(getUniqueCharacters());

    function filterWeapon(type, btn) {
      document.querySelectorAll('.filters button').forEach(function(b){ b.classList.remove('active-filter'); });
      btn.classList.add('active-filter');
      if (type === 'all') {
        render(getUniqueCharacters());
      } else {
        render(characters.filter(function(c){ return c.weapon === type; }));
      }
    }

    document.getElementById('searchInput').addEventListener('input', function() {
      var value = this.value.toLowerCase();
      render(getUniqueCharacters().filter(function(c){ return c.name.toLowerCase().includes(value); }));
    });
